<section class="text-center">
  <div class="container">
    <h2>Our Services</h2>

    <div class="row mt-4">

      <div class="col-md-4" *ngFor="let s of services">
        <div class="card p-4 service-box shadow">
          <h4>{{ s.title }}</h4>
          <p>{{ s.desc }}</p>
        </div>
      </div>

    </div>
  </div>
</section>
